server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # ── Proxy /api/* to the backend container ──────────────────
    # Defer DNS resolution so nginx doesn't crash if backend isn't up yet.
    resolver 127.0.0.11 valid=10s ipv6=off;
    set $backend_upstream http://backend:3000;

    # ^~ gives this prefix PRIORITY over the regex asset-cache block below, so
    # API-served assets (e.g. /api/uploads/<hash>.webp) are always proxied to
    # the backend rather than being matched by the asset regex and 404'd locally.
    location ^~ /api/ {
        proxy_pass         $backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    location / {
        try_files $uri $uri.html $uri/ =404;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;

    # Cache versioned static assets
    location ~* \.(css|js|png|jpg|svg|ico|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    error_page 404 /404.html;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/javascript;
}
