# =============================================================
# MEMI Abbigliamento — Docker Compose
# =============================================================
# Services:
#   mysql       — MySQL 8 database (persistent volume)
#   backend     — Node.js/Express REST API (port 3000)
#   ecommerce   — E-commerce static site (nginx, port 8080)
#   admin       — Admin gestionale static site (nginx, port 8081)
#
# For Coolify:
#   Deploy each service as a separate Coolify resource pointing
#   to the same docker-compose.yml, or use this file with
#   Coolify's "Docker Compose" deployment mode.
#   See DEPLOYMENT.md for step-by-step instructions.
# =============================================================

services:

  # ── MySQL 8 ─────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-changeme_root}
      MYSQL_DATABASE:      ${DB_NAME:-memi_db}
      MYSQL_USER:          ${DB_USER:-memi_user}
      MYSQL_PASSWORD:      ${DB_PASSWORD:-changeme_user}
    volumes:
      - mysql_data:/var/lib/mysql
      # Schema is auto-applied on first start (initdb.d runs only when data volume is empty)
      - ./MEMI-Backend/src/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-changeme_root}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - memi_net

  # ── Backend API ──────────────────────────────────────────────
  backend:
    build:
      context: ./MEMI-Backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health',r=>{process.exit(r.statusCode===200?0:1)}).on('error',()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    environment:
      NODE_ENV:              production
      PORT:                  3000
      DB_HOST:               mysql
      DB_PORT:               3306
      DB_NAME:               ${DB_NAME:-memi_db}
      DB_USER:               ${DB_USER:-memi_user}
      DB_PASSWORD:           ${DB_PASSWORD:-changeme_user}
      JWT_SECRET:            ${JWT_SECRET:-replace_me_64_char_secret}
      JWT_ADMIN_SECRET:      ${JWT_ADMIN_SECRET:-replace_me_admin_secret}
      JWT_EXPIRES_IN:        7d
      JWT_ADMIN_EXPIRES_IN:  8h
      ALLOWED_ORIGINS:       ${ALLOWED_ORIGINS:-https://memi.testdemo.it,https://admin.memi.testdemo.it}
      FRONTEND_URL:          ${FRONTEND_URL:-https://memi.testdemo.it}
      # Admin bootstrap — set these in Coolify to create/rotate the admin login on boot.
      # If set, the backend upserts this admin with a freshly hashed password at startup.
      ADMIN_EMAIL:           ${ADMIN_EMAIL:-}
      ADMIN_PASSWORD:        ${ADMIN_PASSWORD:-}
      # Stripe — set real keys in Coolify env vars
      STRIPE_SECRET_KEY:     ${STRIPE_SECRET_KEY:-}
      STRIPE_PUBLISHABLE_KEY: ${STRIPE_PUBLISHABLE_KEY:-}
      # SMTP / nodemailer — set in Coolify env vars
      SMTP_HOST:             ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT:             ${SMTP_PORT:-587}
      SMTP_SECURE:           ${SMTP_SECURE:-false}
      SMTP_USER:             ${SMTP_USER:-}
      SMTP_PASS:             ${SMTP_PASS:-}
      SMTP_FROM:             ${SMTP_FROM:-}
      # Product image uploads
      UPLOADS_DIR:           /app/uploads
      MAX_UPLOAD_MB:         ${MAX_UPLOAD_MB:-8}
    volumes:
      # Persistent storage for uploaded product images (survives redeploys).
      - uploads_data:/app/uploads
    networks:
      - memi_net
    labels:
      # Coolify / Traefik labels — adjust host rules to your domain
      - "traefik.enable=true"
      - "traefik.http.routers.memi-api.rule=Host(`${API_DOMAIN:-api.memi.testdemo.it}`)"
      - "traefik.http.routers.memi-api.entrypoints=websecure"
      - "traefik.http.routers.memi-api.tls.certresolver=letsencrypt"
      - "traefik.http.services.memi-api.loadbalancer.server.port=3000"
      # Shared HTTP→HTTPS redirect middleware (Traefik picks this up from any container)
      - "traefik.http.middlewares.redirect-to-https.redirectscheme.scheme=https"
      - "traefik.http.middlewares.redirect-to-https.redirectscheme.permanent=true"

  # ── E-commerce (Nginx static) ────────────────────────────────
  ecommerce:
    build:
      context: ./Memi Abbigliamento
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - memi_net
    labels:
      - "traefik.enable=true"
      # HTTPS router
      - "traefik.http.routers.memi-shop.rule=Host(`${SHOP_DOMAIN:-memi.testdemo.it}`) || Host(`www.${SHOP_DOMAIN:-memi.testdemo.it}`)"
      - "traefik.http.routers.memi-shop.entrypoints=websecure"
      - "traefik.http.routers.memi-shop.tls.certresolver=letsencrypt"
      - "traefik.http.services.memi-shop.loadbalancer.server.port=80"
      # HTTP → HTTPS redirect
      - "traefik.http.routers.memi-shop-http.rule=Host(`${SHOP_DOMAIN:-memi.testdemo.it}`) || Host(`www.${SHOP_DOMAIN:-memi.testdemo.it}`)"
      - "traefik.http.routers.memi-shop-http.entrypoints=web"
      - "traefik.http.routers.memi-shop-http.middlewares=redirect-to-https"

  # ── Admin Gestionale (Nginx static) ─────────────────────────
  admin:
    build:
      context: ./MEMI
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - memi_net
    labels:
      - "traefik.enable=true"
      # HTTPS router
      - "traefik.http.routers.memi-admin.rule=Host(`${ADMIN_DOMAIN:-admin.memi.testdemo.it}`)"
      - "traefik.http.routers.memi-admin.entrypoints=websecure"
      - "traefik.http.routers.memi-admin.tls.certresolver=letsencrypt"
      - "traefik.http.services.memi-admin.loadbalancer.server.port=80"
      # HTTP → HTTPS redirect
      - "traefik.http.routers.memi-admin-http.rule=Host(`${ADMIN_DOMAIN:-admin.memi.testdemo.it}`)"
      - "traefik.http.routers.memi-admin-http.entrypoints=web"
      - "traefik.http.routers.memi-admin-http.middlewares=redirect-to-https"


volumes:
  mysql_data:
    driver: local
  uploads_data:
    driver: local

networks:
  memi_net:
    driver: bridge
