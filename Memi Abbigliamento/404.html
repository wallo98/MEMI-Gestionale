<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pagina non trovata · Memi Abbigliamento</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="tokens.css?v=2" />
  <link rel="stylesheet" href="app.css" />
  <style>
    /* Tokens now live in tokens.css (linked above), unified with the
       rest of the site instead of this page's own drifted palette. */
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:var(--font-sans);background:var(--cream);color:var(--espresso);min-height:100dvh;display:flex;flex-direction:column;}
    a{color:inherit;text-decoration:none;}
    button{cursor:pointer;border:none;background:none;font-family:inherit;}

    .simple-header{background:var(--cream);border-bottom:1px solid var(--border);padding:16px 24px;display:flex;align-items:center;justify-content:center;}
    .simple-header a{font-family:var(--font-serif);font-size:1.5rem;font-weight:400;letter-spacing:.06em;color:var(--espresso);}
    .simple-header a span{color:var(--blush-dark);}

    main{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 24px;text-align:center;}

    .err-blob {
      position:relative;width:180px;height:180px;margin:0 auto 2rem;
    }
    .err-blob::before {
      content:'';position:absolute;inset:0;border-radius:60% 40% 55% 45% / 50% 60% 40% 50%;
      background:linear-gradient(135deg,var(--blush),var(--lavender));
      animation:blobSpin 8s linear infinite;
    }
    @keyframes blobSpin{to{border-radius:40% 60% 45% 55% / 60% 40% 60% 40%;}}
    .err-number{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:var(--font-serif);font-size:5rem;font-weight:300;color:var(--espresso);line-height:1;}

    h1{font-family:var(--font-serif);font-size:clamp(1.75rem,5vw,2.5rem);font-weight:300;margin-bottom:.75rem;}
    h1 em{font-style:italic;}
    p{color:var(--text-body);font-size:.95rem;line-height:1.65;max-width:400px;margin:0 auto 2.5rem;}

    .btn-group{display:flex;flex-direction:column;gap:.75rem;width:100%;max-width:320px;}
    .btn-primary{display:flex;align-items:center;justify-content:center;gap:8px;padding:14px 24px;background:var(--espresso);color:var(--cream);border-radius:9999px;font-size:.875rem;font-weight:500;letter-spacing:.04em;transition:background 200ms,transform 150ms;text-decoration:none;}
    .btn-primary:hover{background:var(--espresso-light);transform:translateY(-1px);}
    .btn-secondary{display:flex;align-items:center;justify-content:center;padding:13px 24px;background:transparent;color:var(--espresso);border:1.5px solid var(--border);border-radius:9999px;font-size:.875rem;font-weight:500;transition:border-color 200ms,background 200ms;text-decoration:none;}
    .btn-secondary:hover{border-color:var(--blush-dark);background:var(--blush);}

    .quick-links{margin-top:3rem;display:flex;flex-wrap:wrap;gap:.75rem;justify-content:center;}
    .quick-link{padding:.375rem 1rem;background:var(--cream-warm);border:1px solid var(--border);border-radius:9999px;font-size:.8rem;color:var(--text-body);transition:border-color 180ms;}
    .quick-link:hover{border-color:var(--blush-dark);}

    .simple-footer{border-top:1px solid var(--border);padding:16px;text-align:center;font-size:.75rem;color:var(--text-muted);}
  </style>
</head>
<body>
  <header class="simple-header">
    <a href="index.html">Memi<span>.</span></a>
  </header>

  <main>
    <div class="err-blob" aria-hidden="true">
      <span class="err-number">404</span>
    </div>

    <h1>Pagina <em>non trovata</em></h1>
    <p>Sembra che questa pagina sia andata a fare shopping da sola. Torna alla home o sfoglia la nostra collezione.</p>

    <div class="btn-group">
      <a href="index.html" class="btn-primary">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        Torna alla home
      </a>
      <a href="collections/shop-all/index.html" class="btn-secondary">Sfoglia la collezione</a>
    </div>

    <nav class="quick-links" aria-label="Link rapidi">
      <a href="collections/novita/index.html" class="quick-link">Novità</a>
      <a href="collections/saldi/index.html" class="quick-link">Saldi</a>
      <a href="look.html" class="quick-link">Shop the Look</a>
      <a href="about.html" class="quick-link">Chi Siamo</a>
      <a href="mailto:info@memiabbigliamento.it" class="quick-link">Contattaci</a>
    </nav>
  </main>

  <footer class="simple-footer">
    <p>© 2026 Memi Abbigliamento · <a href="privacy.html" style="color:inherit;text-decoration:underline;">Privacy</a> · <a href="returns.html" style="color:inherit;text-decoration:underline;">Resi</a></p>
  </footer>

  <script src="app.js?v=11"></script>
</body>
</html>
