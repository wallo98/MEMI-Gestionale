<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Area Personale — Memi Abbigliamento</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="tokens.css?v=4" />
  <link rel="stylesheet" href="shop.css?v=4" />
  <link rel="stylesheet" href="app.css?v=3" />
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    html{scroll-behavior:smooth;}
    body{background:var(--bg-base);color:var(--espresso);font-family:var(--font-sans);
         line-height:var(--leading-normal);-webkit-font-smoothing:antialiased;overflow-x:hidden;}
    a{color:inherit;text-decoration:none;}
    button{cursor:pointer;border:none;background:none;font-family:inherit;}

    .announcement-bar{background:var(--blush-light);color:var(--brown-mid);text-align:center;
      padding:var(--space-2) var(--space-4);font-size:var(--text-xs);
      letter-spacing:var(--tracking-wider);text-transform:uppercase;font-weight:500;
      border-bottom:1px solid var(--beige);}

    /* ── Page layout ── */
    .account-page{max-width:900px;margin:0 auto;padding:3rem 1.5rem 6rem;}

    .account-breadcrumb{font-size:.72rem;letter-spacing:.08em;text-transform:uppercase;
      color:var(--brown-light);margin-bottom:2.5rem;display:flex;align-items:center;gap:.5rem;}
    .account-breadcrumb a{color:var(--brown-light);transition:color .2s;}
    .account-breadcrumb a:hover{color:var(--espresso);}
    .account-breadcrumb svg{width:14px;height:14px;stroke:var(--brown-light);fill:none;stroke-width:2;}

    .account-header{margin-bottom:2.5rem;}
    .account-header h1{font-family:var(--font-serif);font-size:clamp(1.8rem,4vw,2.6rem);
      font-weight:300;color:var(--espresso);line-height:1.2;margin-bottom:.3rem;}
    .account-header h1 em{font-style:italic;color:var(--brown-mid);}
    .account-header p{font-size:.82rem;color:var(--brown-light);}

    /* ── Profile card ── */
    .account-card{background:#fff;border:1px solid var(--beige);border-radius:2px;
      padding:1.75rem 2rem;margin-bottom:2rem;display:flex;align-items:center;gap:1.75rem;}
    .account-avatar{width:64px;height:64px;border-radius:50%;background:var(--lavender-light);
      display:flex;align-items:center;justify-content:center;flex-shrink:0;}
    .account-avatar svg{width:28px;height:28px;stroke:var(--espresso);fill:none;stroke-width:1.5;}
    .account-card-info{flex:1;}
    .account-card-name{font-family:var(--font-serif);font-size:1.25rem;font-weight:400;
      color:var(--espresso);margin-bottom:.2rem;}
    .account-card-email{font-size:.8rem;color:var(--brown-light);}
    .account-card-meta{font-size:.75rem;color:var(--brown-light);margin-top:.4rem;}
    .btn-logout{padding:.55rem 1.25rem;border:1px solid var(--beige);border-radius:2px;
      font-size:.75rem;letter-spacing:.08em;text-transform:uppercase;color:var(--brown-mid);
      background:#fff;transition:border-color .2s,color .2s;cursor:pointer;}
    .btn-logout:hover{border-color:var(--espresso);color:var(--espresso);}

    /* ── Tabs ── */
    .account-tabs{display:flex;gap:0;border-bottom:1px solid var(--beige);margin-bottom:2rem;}
    .account-tab{padding:.65rem 1.4rem;font-size:.75rem;letter-spacing:.08em;text-transform:uppercase;
      color:var(--brown-light);border:none;border-bottom:2px solid transparent;background:none;
      cursor:pointer;transition:color .2s,border-color .2s;font-family:var(--font-sans);
      margin-bottom:-1px;}
    .account-tab.active{color:var(--espresso);border-bottom-color:var(--espresso);}
    .account-tab:hover:not(.active){color:var(--espresso);}

    .account-panel{display:none;}
    .account-panel.active{display:block;}

    /* ── Orders ── */
    .orders-list{display:flex;flex-direction:column;gap:1rem;}
    .order-row{background:#fff;border:1px solid var(--beige);border-radius:2px;padding:1.25rem 1.5rem;
      display:grid;grid-template-columns:auto 1fr auto auto;align-items:center;gap:1rem;}
    @media(max-width:600px){.order-row{grid-template-columns:1fr 1fr;grid-template-rows:auto auto;}}
    .order-number{font-family:var(--font-serif);font-size:1rem;font-weight:400;}
    .order-date{font-size:.75rem;color:var(--brown-light);margin-top:.2rem;}
    .order-items-summary{font-size:.8rem;color:var(--brown-mid);}
    .order-total{font-size:.9rem;font-weight:500;color:var(--espresso);}
    .order-status{display:inline-flex;align-items:center;gap:.35rem;font-size:.7rem;
      letter-spacing:.06em;text-transform:uppercase;padding:.3rem .7rem;border-radius:2px;}
    .order-status.in_attesa      {background:#F7F5F0;color:#6B5050;}
    .order-status.in_preparazione{background:#F1F0F8;color:#6B6BA3;}
    .order-status.spedito        {background:#EAF1E0;color:#5F7A3F;}
    .order-status.consegnato     {background:#EAF1E0;color:#5F7A3F;}
    .order-status.annullato      {background:#fff5f5;color:#9b2c2c;}

    /* ── Tracking ── */
    .order-tracking{grid-column:1/-1;display:flex;align-items:center;gap:.6rem;
      font-size:.75rem;color:var(--brown-mid);padding:.5rem 0 0;border-top:1px solid var(--beige);
      margin-top:.25rem;}
    .order-tracking svg{width:14px;height:14px;stroke:var(--brown-mid);fill:none;stroke-width:2;flex-shrink:0;}
    .order-tracking strong{color:var(--espresso);}
    .order-tracking span{font-family:'Courier New',monospace;font-size:.78rem;color:var(--espresso);
      letter-spacing:.04em;}

    .orders-empty{text-align:center;padding:4rem 2rem;}
    .orders-empty-icon{width:48px;height:48px;stroke:var(--brown-light);fill:none;stroke-width:1.2;
      margin:0 auto 1rem;}
    .orders-empty h3{font-family:var(--font-serif);font-size:1.3rem;font-weight:300;
      color:var(--espresso);margin-bottom:.5rem;}
    .orders-empty p{font-size:.83rem;color:var(--brown-light);margin-bottom:1.5rem;}
    .btn-shop{display:inline-block;padding:.7rem 1.8rem;background:var(--espresso);
      color:#fff;font-size:.75rem;letter-spacing:.1em;text-transform:uppercase;
      border-radius:2px;transition:background .2s;}
    .btn-shop:hover{background:var(--brown-mid);}

    /* ── Profile form ── */
    .profile-form{display:grid;grid-template-columns:1fr 1fr;gap:1rem 1.5rem;
      background:#fff;border:1px solid var(--beige);border-radius:2px;padding:2rem;}
    @media(max-width:600px){.profile-form{grid-template-columns:1fr;}}
    .profile-form .field-full{grid-column:1/-1;}
    .field-label{display:block;font-size:.72rem;letter-spacing:.08em;text-transform:uppercase;
      color:var(--brown-light);margin-bottom:.4rem;}
    .field-input{width:100%;padding:.65rem .85rem;border:1px solid var(--beige);border-radius:2px;
      font-family:var(--font-sans);font-size:.85rem;color:var(--espresso);background:#fff;
      transition:border-color .2s;outline:none;}
    .field-input:focus{border-color:var(--brown-mid);}
    .profile-form-footer{grid-column:1/-1;display:flex;align-items:center;gap:1rem;
      padding-top:.5rem;}
    .btn-save{padding:.65rem 1.6rem;background:var(--espresso);color:#fff;border:none;
      border-radius:2px;font-size:.75rem;letter-spacing:.1em;text-transform:uppercase;
      cursor:pointer;transition:background .2s;}
    .btn-save:hover{background:var(--brown-mid);}
    .profile-msg{font-size:.8rem;color:var(--brown-mid);}
    .profile-msg.ok{color:#5F7A3F;}
    .profile-msg.err{color:#9b2c2c;}

    /* ── Loading / skeleton ── */
    .acc-skeleton{display:flex;flex-direction:column;gap:.75rem;}
    .skel{background:var(--beige);border-radius:2px;animation:skel-pulse 1.4s ease infinite;}
    .skel-line{height:14px;width:60%;}
    .skel-line.wide{width:90%;}
    .skel-block{height:80px;}
    @keyframes skel-pulse{0%,100%{opacity:.6;}50%{opacity:1;}}

    /* ── Redirect notice ── */
    .acc-redirect{text-align:center;padding:6rem 2rem;}
    .acc-redirect p{font-size:.9rem;color:var(--brown-mid);margin-bottom:1rem;}
    .acc-redirect a{color:var(--espresso);text-decoration:underline;text-underline-offset:3px;}
  </style>
</head>
<body>

<div class="announcement-bar">✦ &nbsp;Spedizione gratuita su ordini superiori a €50 &nbsp;✦&nbsp; Reso gratuito entro 30 giorni &nbsp;✦</div>
<div data-include="site-header"></div>

<main class="ap-wrap" id="accountMain">
  <div class="acc-skeleton">
    <div class="skel skel-line"></div>
    <div class="skel skel-block"></div>
    <div class="skel skel-block"></div>
  </div>
</main>

<script src="api-client.js?v=5"></script>
<script src="app.js?v=17"></script>
<script src="account-core.js?v=2"></script>
</body>
</html>
