<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reimposta Password — Memi Abbigliamento</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="tokens.css?v=2" />
  <link rel="stylesheet" href="shop.css?v=2" />
  <link rel="stylesheet" href="app.css" />
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    body{background:var(--bg-base);color:var(--espresso);font-family:var(--font-sans);
         line-height:var(--leading-normal);-webkit-font-smoothing:antialiased;
         display:flex;align-items:center;justify-content:center;min-height:100vh;padding:2rem;}
    .reset-card{background:#fff;border:1px solid var(--beige);border-radius:2px;
      padding:2.5rem 2.5rem;max-width:420px;width:100%;}
    .reset-logo{font-family:var(--font-serif);font-size:1.8rem;font-weight:300;
      color:var(--espresso);text-align:center;margin-bottom:2rem;letter-spacing:.05em;}
    .reset-logo em{font-style:italic;color:var(--brown-mid);}
    .reset-title{font-family:var(--font-serif);font-size:1.3rem;font-weight:300;
      color:var(--espresso);margin-bottom:.5rem;}
    .reset-sub{font-size:.82rem;color:var(--brown-light);margin-bottom:1.75rem;line-height:1.6;}
    .field-label{display:block;font-size:.7rem;letter-spacing:.1em;text-transform:uppercase;
      color:var(--brown-light);margin-bottom:.4rem;}
    .field-input{width:100%;padding:.65rem .9rem;border:1px solid var(--beige);border-radius:2px;
      font-family:var(--font-sans);font-size:.88rem;color:var(--espresso);background:#fff;
      transition:border-color .2s;outline:none;margin-bottom:1rem;}
    .field-input:focus{border-color:var(--brown-mid);}
    .btn-reset{width:100%;padding:.75rem;background:var(--espresso);color:#fff;border:none;
      border-radius:2px;font-size:.78rem;letter-spacing:.1em;text-transform:uppercase;
      cursor:pointer;transition:background .2s;margin-top:.25rem;}
    .btn-reset:hover:not(:disabled){background:var(--brown-mid);}
    .btn-reset:disabled{opacity:.5;cursor:default;}
    .msg{font-size:.82rem;margin-top:1rem;line-height:1.5;padding:.6rem .8rem;border-radius:2px;}
    .msg.ok{background:#ecf8f0;color:#2d7a4f;}
    .msg.err{background:#fff5f5;color:#9b2c2c;}
    .back-link{display:block;text-align:center;margin-top:1.25rem;font-size:.78rem;
      color:var(--brown-light);text-decoration:underline;text-underline-offset:3px;cursor:pointer;}
    .back-link:hover{color:var(--espresso);}
    /* Expired token state */
    .expired-state{text-align:center;}
    .expired-state p{font-size:.88rem;color:var(--brown-light);margin-bottom:1.25rem;line-height:1.6;}
  </style>
</head>
<body>
<div class="reset-card" id="resetCard">
  <div class="reset-logo">Memi<em>.</em></div>
  <!-- JS populates content based on token validity -->
  <p style="text-align:center;color:var(--brown-light);font-size:.85rem;">Verifica in corso…</p>
</div>

<script src="api-client.js?v=3"></script>
<script>
(function () {
  'use strict';

  var card = document.getElementById('resetCard');
  var token = new URLSearchParams(location.search).get('token');

  function logo() {
    return '<div class="reset-logo">Memi<em>.</em></div>';
  }

  function showExpired() {
    card.innerHTML = logo() +
      '<div class="expired-state">' +
        '<h2 class="reset-title" style="text-align:center;margin-bottom:.5rem;">Link scaduto</h2>' +
        '<p>Il link di recupero non è più valido. I link scadono dopo 1 ora per sicurezza.</p>' +
        '<button class="btn-reset" onclick="window.location.href=\'index.html\'">Torna alla Home</button>' +
      '</div>';
  }

  function showForm() {
    card.innerHTML = logo() +
      '<h2 class="reset-title">Nuova password</h2>' +
      '<p class="reset-sub">Scegli una password sicura di almeno 8 caratteri.</p>' +
      '<form id="resetForm">' +
        '<label class="field-label" for="pw1">Nuova password</label>' +
        '<input class="field-input" type="password" id="pw1" minlength="8" required placeholder="••••••••" />' +
        '<label class="field-label" for="pw2">Conferma password</label>' +
        '<input class="field-input" type="password" id="pw2" minlength="8" required placeholder="••••••••" />' +
        '<button type="submit" class="btn-reset" id="submitBtn">Reimposta password</button>' +
        '<div id="resetMsg" class="msg" style="display:none;"></div>' +
      '</form>' +
      '<a class="back-link" href="index.html">Torna alla Home</a>';

    document.getElementById('resetForm').addEventListener('submit', function (e) {
      e.preventDefault();
      var pw1 = document.getElementById('pw1').value;
      var pw2 = document.getElementById('pw2').value;
      var msg = document.getElementById('resetMsg');
      var btn = document.getElementById('submitBtn');

      if (pw1 !== pw2) {
        msg.textContent = 'Le password non coincidono.';
        msg.className = 'msg err';
        msg.style.display = '';
        return;
      }
      if (pw1.length < 8) {
        msg.textContent = 'La password deve avere almeno 8 caratteri.';
        msg.className = 'msg err';
        msg.style.display = '';
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Reimpostazione…';
      msg.style.display = 'none';

      fetch('/api/auth/reset-password', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token: token, password: pw1 }),
      })
        .then(function (r) { return r.json(); })
        .then(function (data) {
          if (data.ok) {
            msg.textContent = 'Password reimpostata con successo! Verrai reindirizzata al login.';
            msg.className = 'msg ok';
            msg.style.display = '';
            document.getElementById('resetForm').querySelectorAll('input,button').forEach(function(el){ el.disabled = true; });
            setTimeout(function () {
              window.location.href = 'index.html';
            }, 2500);
          } else {
            msg.textContent = data.error || 'Errore nella reimpostazione. Riprova.';
            msg.className = 'msg err';
            msg.style.display = '';
            btn.disabled = false;
            btn.textContent = 'Reimposta password';
          }
        })
        .catch(function () {
          msg.textContent = 'Errore di rete. Riprova.';
          msg.className = 'msg err';
          msg.style.display = '';
          btn.disabled = false;
          btn.textContent = 'Reimposta password';
        });
    });
  }

  // Validate token client-side first (basic JWT decode — not signature check, just expiry)
  if (!token) { showExpired(); return; }

  try {
    var parts = token.split('.');
    if (parts.length !== 3) { showExpired(); return; }
    var payload = JSON.parse(atob(parts[1].replace(/-/g, '+').replace(/_/g, '/')));
    if (!payload.exp || Date.now() / 1000 > payload.exp) { showExpired(); return; }
    if (payload.type !== 'password_reset') { showExpired(); return; }
    showForm();
  } catch (_) {
    showExpired();
  }
})();
</script>
</body>
</html>
