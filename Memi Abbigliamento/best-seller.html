<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Best Sellers — Memi Abbigliamento</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="tokens.css?v=4" />
  <link rel="stylesheet" href="shop.css?v=5" />
  <link rel="stylesheet" href="app.css?v=3" />
  <style>
    /* ── Page header ── */
    .bs-header {
      max-width: 1280px;
      margin: 0 auto;
      padding: clamp(3.5rem, 7vw, 6rem) var(--space-6) clamp(2rem, 4vw, 3rem);
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: var(--space-6);
      flex-wrap: wrap;
      border-bottom: 1px solid var(--beige);
    }
    .bs-header-text {}
    .bs-eyebrow {
      font-size: var(--text-xs);
      letter-spacing: var(--tracking-wider);
      text-transform: uppercase;
      color: var(--brown-light);
      font-weight: 500;
      margin-bottom: var(--space-3);
    }
    .bs-title {
      font-family: var(--font-serif);
      font-size: clamp(2.5rem, 5vw, 4rem);
      font-weight: 300;
      letter-spacing: -0.03em;
      line-height: 1.08;
    }
    .bs-title em { font-style: italic; }
    .bs-subtitle {
      margin-top: var(--space-3);
      font-size: var(--text-sm);
      color: var(--brown-mid);
      max-width: 420px;
    }
    .bs-sort {
      display: flex;
      align-items: center;
      gap: var(--space-2);
      font-size: var(--text-xs);
      color: var(--brown-light);
    }
    .bs-sort select {
      border: 1.5px solid var(--beige-dark);
      border-radius: var(--radius-sm);
      padding: 6px 12px;
      font-size: var(--text-xs);
      font-family: var(--font-sans);
      color: var(--espresso);
      background: var(--white);
      cursor: pointer;
    }

    /* ── Rank badges ── */
    .rank-badge {
      position: absolute;
      top: var(--space-3);
      left: var(--space-3);
      width: 28px;
      height: 28px;
      border-radius: var(--radius-full);
      background: var(--espresso);
      color: var(--white);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: -0.02em;
      z-index: 2;
    }
    .rank-badge.gold   { background: #6B6BA3; }
    .rank-badge.silver { background: #9A9A9A; }
    .rank-badge.bronze { background: #5F7A3F; }

    /* ── Featured top-3 row ── */
    .bs-featured {
      max-width: 1280px;
      margin: 0 auto;
      padding: clamp(2rem, 4vw, 3.5rem) var(--space-6) 0;
    }
    .bs-featured-label {
      font-size: var(--text-xs);
      letter-spacing: var(--tracking-wider);
      text-transform: uppercase;
      color: var(--brown-light);
      margin-bottom: var(--space-5);
      display: flex;
      align-items: center;
      gap: var(--space-3);
    }
    .bs-featured-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--beige);
    }
    .bs-top3 {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: var(--space-5);
    }
    @media (max-width: 640px) {
      .bs-top3 { grid-template-columns: 1fr 1fr; }
      .bs-top3 > *:last-child { display: none; }
    }

    /* ── Rest of grid ── */
    .bs-rest {
      max-width: 1280px;
      margin: 0 auto;
      padding: clamp(2rem, 4vw, 3.5rem) var(--space-6) clamp(3rem, 6vw, 5rem);
    }
    .bs-rest-label {
      font-size: var(--text-xs);
      letter-spacing: var(--tracking-wider);
      text-transform: uppercase;
      color: var(--brown-light);
      margin-bottom: var(--space-5);
      display: flex;
      align-items: center;
      gap: var(--space-3);
    }
    .bs-rest-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--beige);
    }
  </style>
</head>
<body>

  <div class="announcement-bar">Spedizione gratuita da €50 &nbsp;·&nbsp; Resi gratuiti entro 30 giorni</div>
  <div data-include="site-header"></div>

  <!-- HEADER -->
  <div class="bs-header">
    <div class="bs-header-text">
      <p class="bs-eyebrow">I più amati</p>
      <h1 class="bs-title">Best<br><em>Sellers</em></h1>
      <p class="bs-subtitle">I capi che le nostre clienti continuano a scegliere. Eleganza senza tempo, qualità che si sente.</p>
    </div>
    <div class="bs-sort">
      <span>Ordina per</span>
      <select aria-label="Ordina per">
        <option>Più venduti</option>
        <option>Prezzo crescente</option>
        <option>Prezzo decrescente</option>
        <option>Novità</option>
      </select>
    </div>
  </div>

  <!-- TOP 3 FEATURED -->
  <div class="bs-featured">
    <p class="bs-featured-label">Top 3 della stagione</p>
    <div class="bs-top3">
      <!-- Top 3 injected at runtime by catalog-loader.js -->
    
            </div>
          </div>
        </article>
      </a>

    </div>
  </div>

  <!-- REST OF BESTSELLERS -->
  <div class="bs-rest">
    <p class="bs-rest-label">Ancora molto amati</p>
    <div class="product-grid cols-4">
      <!-- Cards injected at runtime by catalog-loader.js (top products by popularity) -->
    

    </div>
  </div>

  <div data-include="site-footer"></div>

  <script>
  (function(){
    var sel = document.querySelector('.bs-sort select');
    if (!sel) return;
    sel.addEventListener('change', function(){
      var mode = this.selectedIndex; // 0=venduti,1=asc,2=desc,3=novita
      var grid = document.querySelector('.bs-rest .product-grid');
      if (!grid) return;
      var items = Array.from(grid.querySelectorAll('a.product-card-link'));
      items.sort(function(a, b){
        function price(el){
          return parseFloat((el.querySelector('.price-current')||{}).textContent||'0')
            .replace ? parseFloat(((el.querySelector('.price-current')||{}).textContent||'0').replace(/[^\d,]/g,'').replace(',','.')) : 0;
        }
        var pa = parseFloat(((a.querySelector('.price-current')||{}).textContent||'0').replace(/[^\d,]/g,'').replace(',','.'));
        var pb = parseFloat(((b.querySelector('.price-current')||{}).textContent||'0').replace(/[^\d,]/g,'').replace(',','.'));
        var ra = parseInt(((a.querySelector('.rank-badge')||{}).textContent||'99').trim(), 10);
        var rb = parseInt(((b.querySelector('.rank-badge')||{}).textContent||'99').trim(), 10);
        if (mode === 1) return pa - pb;
        if (mode === 2) return pb - pa;
        if (mode === 3) {
          var na = !!a.querySelector('.badge-new'), nb = !!b.querySelector('.badge-new');
          if (na && !nb) return -1; if (!na && nb) return 1;
          return ra - rb;
        }
        return ra - rb;
      });
      items.forEach(function(el){ grid.appendChild(el); });
    });
  })();
  </script>
  <script src="api-client.js?v=5"></script>
  <script src="app.js?v=17"></script>
  <script>window.MEMI_CATALOG={mode:'best-seller',limit:12};</script>
  <script src="catalog-loader.js?v=3"></script>
</body>
</html>
