<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Articolo — Memi Abbigliamento</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="tokens.css?v=4" />
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    html{scroll-behavior:smooth;}
    body{background:var(--bg-base);color:var(--espresso);font-family:var(--font-sans);line-height:var(--leading-normal);-webkit-font-smoothing:antialiased;overflow-x:hidden;}
    img{display:block;max-width:100%;}
    a{color:inherit;}
    button{cursor:pointer;border:none;background:none;font-family:inherit;}
    .announcement-bar{background:var(--blush-light);color:var(--brown-mid);text-align:center;padding:var(--space-2) var(--space-4);font-size:var(--text-xs);letter-spacing:var(--tracking-wider);text-transform:uppercase;font-weight:500;border-bottom:1px solid var(--beige);}
    .article{max-width:760px;margin:0 auto;padding:clamp(3rem,6vw,5rem) var(--space-6) clamp(4rem,8vw,6rem);}
    .article-back{font-size:var(--text-xs);letter-spacing:var(--tracking-wide);text-transform:uppercase;color:var(--brown-light);margin-bottom:var(--space-6);display:inline-block;}
    .article-cover{aspect-ratio:16/9;border-radius:var(--radius-lg,12px);overflow:hidden;margin-bottom:var(--space-8);}
    .article-date{font-size:var(--text-xs);letter-spacing:var(--tracking-wide);text-transform:uppercase;color:var(--brown-light);margin-bottom:var(--space-3);}
    .article-title{font-family:var(--font-serif);font-size:clamp(2.2rem,4.5vw,3.6rem);font-weight:300;letter-spacing:-0.02em;line-height:1.1;margin-bottom:var(--space-8);}
    .prose{font-size:var(--text-base);color:var(--brown-mid);line-height:1.95;}
    .prose p{margin:0 0 1.2em;}
    .prose h2,.prose h3{font-family:var(--font-serif);color:var(--espresso);font-weight:400;margin:1.6em 0 .6em;line-height:1.25;}
    .prose img{border-radius:var(--radius-lg,12px);margin:1.5em 0;}
    .prose a{color:var(--espresso);text-decoration:underline;}
    .prose ul,.prose ol{margin:0 0 1.2em 1.4em;}
    .article-state{text-align:center;color:var(--brown-light);padding:5rem 1rem;}
  </style>
  <link rel="stylesheet" href="app.css?v=3" />
</head>
<body>
  <div class="announcement-bar">Spedizione gratuita da €50 &nbsp;·&nbsp; Resi gratuiti entro 30 giorni</div>
  <div data-include="site-header"></div>

  <article class="article" id="articleRoot">
    <p class="article-state">Caricamento…</p>
  </article>

  <div data-include="site-footer"></div>

  <script src="api-client.js?v=5"></script>
  <script src="app.js?v=17"></script>
  <script>
  (function(){
    function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
    function fmtDate(d){ if(!d) return ''; try{return new Date(d).toLocaleDateString('it-IT',{day:'numeric',month:'long',year:'numeric'});}catch(_){return '';} }
    var root = document.getElementById('articleRoot');
    var slug = new URLSearchParams(location.search).get('slug');
    if(!slug){ root.innerHTML = '<p class="article-state">Articolo non trovato.</p>'; return; }
    fetch('/api/cms/published/blog/' + encodeURIComponent(slug))
      .then(function(r){ if(!r.ok) throw new Error('404'); return r.json(); })
      .then(function(p){
        document.title = (p.titolo || 'Articolo') + ' — Memi Abbigliamento';
        var cover = p.cover_color || 'linear-gradient(135deg,#F1F0F8,#D5E4C3)';
        root.innerHTML =
          '<a class="article-back" href="/blog">← Tutti gli articoli</a>' +
          '<div class="article-cover" style="background:' + cover + '"></div>' +
          (p.published_at ? '<p class="article-date">' + fmtDate(p.published_at) + '</p>' : '') +
          '<h1 class="article-title">' + esc(p.titolo) + '</h1>' +
          '<div class="prose">' + (p.contenuto || ('<p>' + esc(p.estratto || '') + '</p>')) + '</div>';
      })
      .catch(function(){ root.innerHTML = '<p class="article-state">Articolo non trovato. <a href="/blog" style="text-decoration:underline">Torna al blog</a></p>'; });
  })();
  </script>
</body>
</html>
