<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pagina — Memi Abbigliamento</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="tokens.css?v=2" />
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    html{scroll-behavior:smooth;}
    body{background:var(--bg-base);color:var(--espresso);font-family:var(--font-sans);line-height:var(--leading-normal);-webkit-font-smoothing:antialiased;overflow-x:hidden;}
    img{display:block;max-width:100%;}
    a{color:inherit;}
    button{cursor:pointer;border:none;background:none;font-family:inherit;}
    .announcement-bar{background:var(--blush-light);color:var(--brown-mid);text-align:center;padding:var(--space-2) var(--space-4);font-size:var(--text-xs);letter-spacing:var(--tracking-wider);text-transform:uppercase;font-weight:500;border-bottom:1px solid var(--blush);}
    .page-hero{padding:clamp(4rem,8vw,7rem) var(--space-6) clamp(2rem,4vw,3rem);max-width:880px;margin:0 auto;border-bottom:1px solid var(--beige);}
    .page-hero-eyebrow{font-size:var(--text-xs);letter-spacing:var(--tracking-wider);text-transform:uppercase;color:var(--brown-light);font-weight:500;margin-bottom:var(--space-3);}
    .page-hero-title{font-family:var(--font-serif);font-size:clamp(2.5rem,5vw,4.5rem);font-weight:300;letter-spacing:-0.03em;line-height:1.08;}
    .page-body{max-width:760px;margin:0 auto;padding:clamp(2.5rem,5vw,4rem) var(--space-6) clamp(4rem,8vw,6rem);}
    .prose{font-size:var(--text-base);color:var(--brown-mid);line-height:1.95;}
    .prose p{margin:0 0 1.2em;}
    .prose h2,.prose h3{font-family:var(--font-serif);color:var(--espresso);font-weight:400;margin:1.6em 0 .6em;line-height:1.25;}
    .prose img{border-radius:var(--radius-lg,12px);margin:1.5em 0;}
    .prose a{color:var(--espresso);text-decoration:underline;}
    .prose ul,.prose ol{margin:0 0 1.2em 1.4em;}
    .page-state{text-align:center;color:var(--brown-light);padding:5rem 1rem;}
  </style>
  <link rel="stylesheet" href="app.css" />
</head>
<body>
  <div class="announcement-bar">Spedizione gratuita da €50 &nbsp;·&nbsp; Resi gratuiti entro 30 giorni</div>
  <div data-include="site-header"></div>

  <div class="page-hero" id="pageHero" style="display:none">
    <p class="page-hero-eyebrow">Memi Abbigliamento</p>
    <h1 class="page-hero-title" id="pageTitle"></h1>
  </div>
  <div class="page-body">
    <div id="pageContent"><p class="page-state">Caricamento…</p></div>
  </div>

  <div data-include="site-footer"></div>

  <script src="api-client.js?v=3"></script>
  <script src="app.js?v=11"></script>
  <script>
  (function(){
    function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
    var slug = new URLSearchParams(location.search).get('slug');
    var hero = document.getElementById('pageHero');
    var content = document.getElementById('pageContent');
    if(!slug){ content.innerHTML = '<p class="page-state">Pagina non trovata.</p>'; return; }
    fetch('/api/cms/published/pages/' + encodeURIComponent(slug))
      .then(function(r){ if(!r.ok) throw new Error('404'); return r.json(); })
      .then(function(p){
        document.title = (p.titolo || 'Pagina') + ' — Memi Abbigliamento';
        document.getElementById('pageTitle').textContent = p.titolo || '';
        hero.style.display = '';
        content.innerHTML = '<div class="prose">' + (p.contenuto || '') + '</div>';
      })
      .catch(function(){ content.innerHTML = '<p class="page-state">Pagina non trovata. <a href="/" style="text-decoration:underline">Torna alla home</a></p>'; });
  })();
  </script>
</body>
</html>
