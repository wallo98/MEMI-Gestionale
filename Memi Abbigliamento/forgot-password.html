<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Password dimenticata — Memi Abbigliamento</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="tokens.css?v=2" />
  <link rel="stylesheet" href="shop.css?v=2" />
  <link rel="stylesheet" href="app.css" />
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    body{background:var(--bg-base);color:var(--espresso);font-family:var(--font-sans);
         line-height:var(--leading-normal);-webkit-font-smoothing:antialiased;
         display:flex;align-items:center;justify-content:center;min-height:100vh;padding:2rem;}
    .forgot-card{background:#fff;border:1px solid var(--beige);border-radius:2px;
      padding:2.5rem;max-width:420px;width:100%;}
    .forgot-logo{font-family:var(--font-serif);font-size:1.8rem;font-weight:300;
      color:var(--espresso);text-align:center;margin-bottom:2rem;letter-spacing:.05em;}
    .forgot-logo em{font-style:italic;color:var(--brown-mid);}
    .forgot-title{font-family:var(--font-serif);font-size:1.3rem;font-weight:300;
      color:var(--espresso);margin-bottom:.5rem;}
    .forgot-sub{font-size:.82rem;color:var(--brown-light);margin-bottom:1.75rem;line-height:1.6;}
    .field-label{display:block;font-size:.7rem;letter-spacing:.1em;text-transform:uppercase;
      color:var(--brown-light);margin-bottom:.4rem;}
    .field-input{width:100%;padding:.65rem .9rem;border:1px solid var(--beige);border-radius:2px;
      font-family:var(--font-sans);font-size:.88rem;color:var(--espresso);background:#fff;
      transition:border-color .2s;outline:none;margin-bottom:1.25rem;}
    .field-input:focus{border-color:var(--brown-mid);}
    .btn-submit{width:100%;padding:.75rem;background:var(--espresso);color:#fff;border:none;
      border-radius:2px;font-size:.78rem;letter-spacing:.1em;text-transform:uppercase;
      cursor:pointer;transition:background .2s;margin-top:.25rem;}
    .btn-submit:hover:not(:disabled){background:var(--brown-mid);}
    .btn-submit:disabled{opacity:.5;cursor:default;}
    .msg{font-size:.82rem;margin-top:1rem;line-height:1.5;padding:.6rem .8rem;border-radius:2px;}
    .msg.ok{background:#ecf8f0;color:#2d7a4f;}
    .msg.err{background:#fff5f5;color:#9b2c2c;}
    .back-link{display:block;text-align:center;margin-top:1.25rem;font-size:.78rem;
      color:var(--brown-light);text-decoration:underline;text-underline-offset:3px;}
    .back-link:hover{color:var(--espresso);}
  </style>
</head>
<body>
<div class="forgot-card">
  <div class="forgot-logo">Memi<em>.</em></div>
  <h2 class="forgot-title">Password dimenticata</h2>
  <p class="forgot-sub">Inserisci l'email del tuo account. Ti invieremo un link per reimpostare la password.</p>
  <form id="forgotForm" novalidate>
    <label class="field-label" for="forgotEmail">Email</label>
    <input class="field-input" type="email" id="forgotEmail" placeholder="la.tua@email.com" autocomplete="email" required />
    <button type="submit" class="btn-submit" id="forgotBtn">Invia link di recupero</button>
    <div id="forgotMsg" class="msg" style="display:none;"></div>
  </form>
  <a class="back-link" href="index.html">← Torna alla Home</a>
</div>

<script src="api-client.js?v=3"></script>
<script>
(function () {
  'use strict';

  var form = document.getElementById('forgotForm');
  var input = document.getElementById('forgotEmail');
  var btn   = document.getElementById('forgotBtn');
  var msg   = document.getElementById('forgotMsg');

  var EMAIL_RE = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

  function showMsg(text, type) {
    msg.textContent = text;
    msg.className   = 'msg ' + type;
    msg.style.display = '';
  }

  form.addEventListener('submit', function (e) {
    e.preventDefault();
    msg.style.display = 'none';

    var email = input.value.trim();
    if (!email || !EMAIL_RE.test(email)) {
      input.style.borderColor = '#C4A8B0';
      input.focus();
      input.addEventListener('input', function reset() {
        input.style.borderColor = '';
        input.removeEventListener('input', reset);
      });
      return;
    }

    btn.disabled    = true;
    btn.textContent = 'Invio in corso…';

    var apiBase = (window.MemiAPI && window.MemiAPI._base) || '/api';
    fetch(apiBase + '/auth/forgot-password', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ email: email }),
    })
      .then(function (r) { return r.json().catch(function () { return {}; }); })
      .then(function (data) {
        if (data.ok || data.message) {
          // Always show a neutral message to avoid email enumeration
          showMsg('Se l\'indirizzo è registrato riceverai un\'email con il link di recupero.', 'ok');
          form.querySelectorAll('input,button').forEach(function (el) { el.disabled = true; });
        } else {
          showMsg(data.error || 'Errore nell\'invio. Riprova tra qualche minuto.', 'err');
          btn.disabled    = false;
          btn.textContent = 'Invia link di recupero';
        }
      })
      .catch(function () {
        showMsg('Errore di rete. Controlla la connessione e riprova.', 'err');
        btn.disabled    = false;
        btn.textContent = 'Invia link di recupero';
      });
  });
})();
</script>
</body>
</html>
