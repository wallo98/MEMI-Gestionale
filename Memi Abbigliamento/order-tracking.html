<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="memi-api" content="/api" />
  <title>Traccia il tuo ordine · Memi Abbigliamento</title>
  <meta name="description" content="Controlla lo stato del tuo ordine Memi Abbigliamento inserendo il numero d'ordine e il tuo indirizzo email." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="tokens.css?v=4" />
  <link rel="stylesheet" href="app.css?v=3" />
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:var(--font-sans);background:var(--cream);color:var(--espresso);line-height:1.65;-webkit-font-smoothing:antialiased;}
    a{color:var(--blush-dark);}

    .simple-header{background:var(--cream);border-bottom:1px solid var(--border);padding:16px 24px;display:flex;align-items:center;justify-content:space-between;}
    .simple-header .logo{font-family:var(--font-serif);font-size:1.4rem;font-weight:400;letter-spacing:.06em;color:var(--espresso);text-decoration:none;}
    .simple-header .logo span{color:var(--blush-dark);}
    .simple-header .back{font-size:.8rem;color:var(--text-muted);text-decoration:underline;text-underline-offset:3px;transition:color 150ms;}
    .simple-header .back:hover{color:var(--espresso);}

    .track-wrap{max-width:680px;margin:0 auto;padding:56px 24px 100px;}

    .track-eyebrow{font-size:.7rem;letter-spacing:.14em;text-transform:uppercase;color:var(--text-muted);font-weight:500;margin-bottom:.75rem;}
    .track-title{font-family:var(--font-serif);font-size:clamp(2rem,5vw,2.8rem);font-weight:300;line-height:1.1;margin-bottom:.5rem;}
    .track-title em{font-style:italic;}
    .track-subtitle{font-size:.9rem;color:var(--text-muted);margin-bottom:2.5rem;padding-bottom:2rem;border-bottom:1px solid var(--border);}

    .track-form{display:flex;flex-direction:column;gap:1rem;margin-bottom:2.5rem;}
    .track-form label{font-size:.75rem;letter-spacing:.08em;text-transform:uppercase;color:var(--text-muted);font-weight:500;display:block;margin-bottom:.35rem;}
    .track-form input{width:100%;padding:.75rem 1rem;border:1px solid var(--border);border-radius:4px;background:var(--cream);color:var(--espresso);font-size:.95rem;font-family:var(--font-sans);outline:none;transition:border-color .2s;}
    .track-form input:focus{border-color:var(--espresso);}
    .track-btn{align-self:flex-start;padding:.75rem 2.2rem;background:var(--espresso);color:#fff;border:none;border-radius:4px;font-family:var(--font-sans);font-size:.85rem;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;transition:background .2s;}
    .track-btn:hover{background:var(--blush-dark);}
    .track-btn:disabled{opacity:.55;cursor:not-allowed;}

    .track-error{display:none;background:#fdf0f0;border:1px solid #f5c6c6;border-radius:4px;padding:1rem 1.25rem;color:#a94442;font-size:.88rem;margin-bottom:1.5rem;}
    .track-error.visible{display:block;}

    /* Result card */
    #trackResult{display:none;}
    #trackResult.visible{display:block;}

    .order-card{background:#fff;border:1px solid var(--border);border-radius:8px;overflow:hidden;}
    .order-card-header{background:var(--lavender-light,#F1F0F8);padding:1.25rem 1.5rem;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.5rem;}
    .order-card-header .order-num{font-family:var(--font-serif);font-size:1.2rem;font-weight:400;color:var(--espresso);}
    .order-card-header .order-date{font-size:.78rem;color:var(--text-muted);}

    .order-status-badge{display:inline-flex;align-items:center;gap:.4rem;padding:.3rem .85rem;border-radius:99px;font-size:.72rem;letter-spacing:.07em;text-transform:uppercase;font-weight:600;}
    .status-in_attesa   {background:#F7F5F0;color:#6B5050;}
    .status-in_preparazione{background:#F1F0F8;color:#6B6BA3;}
    .status-spedito     {background:#EAF1E0;color:#5F7A3F;}
    .status-consegnato  {background:#EAF1E0;color:#5F7A3F;}
    .status-annullato   {background:#f8d7da;color:#721c24;}

    .order-body{padding:1.5rem;}
    .order-section{margin-bottom:1.5rem;}
    .order-section:last-child{margin-bottom:0;}
    .order-section-label{font-size:.68rem;letter-spacing:.12em;text-transform:uppercase;color:var(--text-muted);font-weight:600;margin-bottom:.6rem;}

    .info-grid{display:grid;grid-template-columns:1fr 1fr;gap:.5rem 2rem;}
    @media(max-width:480px){.info-grid{grid-template-columns:1fr;}}
    .info-row{display:flex;flex-direction:column;}
    .info-row .lbl{font-size:.72rem;color:var(--text-muted);}
    .info-row .val{font-size:.9rem;color:var(--espresso);font-weight:500;}

    .timeline{display:flex;gap:0;position:relative;padding:0 0 1rem;}
    .timeline::before{content:'';position:absolute;top:12px;left:12px;right:12px;height:2px;background:var(--border);z-index:0;}
    .tl-step{flex:1;display:flex;flex-direction:column;align-items:center;gap:.5rem;position:relative;z-index:1;}
    .tl-dot{width:24px;height:24px;border-radius:50%;background:var(--border);border:2px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
    .tl-dot.done{background:var(--espresso);border-color:var(--espresso);}
    .tl-dot.done svg{stroke:#fff;width:11px;height:11px;}
    .tl-label{font-size:.65rem;text-align:center;color:var(--text-muted);line-height:1.3;}
    .tl-label.done{color:var(--espresso);font-weight:600;}

    .tracking-link{display:inline-flex;align-items:center;gap:.4rem;padding:.55rem 1.25rem;border:1px solid var(--espresso);border-radius:4px;font-size:.8rem;color:var(--espresso);text-decoration:none;transition:background .2s,color .2s;margin-top:.75rem;}
    .tracking-link:hover{background:var(--espresso);color:#fff;}
    .tracking-link svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;}

    .order-total-row{display:flex;justify-content:space-between;align-items:center;padding-top:1rem;border-top:1px solid var(--border);font-size:.9rem;}
    .order-total-row .total-val{font-family:var(--font-serif);font-size:1.3rem;font-weight:400;}

    .track-new-search{margin-top:1.5rem;font-size:.83rem;color:var(--text-muted);}
    .track-new-search a{color:var(--blush-dark);cursor:pointer;}
  </style>
</head>
<body>

  <header class="simple-header" role="banner">
    <a href="/" class="logo">Memi<span>.</span></a>
    <a href="/" class="back">← Torna al negozio</a>
  </header>

  <main class="track-wrap" role="main">
    <p class="track-eyebrow">Assistenza</p>
    <h1 class="track-title">Traccia il tuo <em>ordine</em></h1>
    <p class="track-subtitle">Inserisci il numero d'ordine (trovi nella email di conferma) e l'indirizzo email usato per l'acquisto.</p>

    <form class="track-form" id="trackForm" novalidate>
      <div>
        <label for="orderNumber">Numero ordine</label>
        <input type="text" id="orderNumber" placeholder="es. MEMI-20260001" autocomplete="off" required />
      </div>
      <div>
        <label for="orderEmail">Indirizzo email</label>
        <input type="email" id="orderEmail" placeholder="la tua email" autocomplete="email" required />
      </div>
      <button type="submit" class="track-btn" id="trackBtn">Cerca ordine</button>
    </form>

    <div class="track-error" id="trackError" role="alert" aria-live="polite"></div>

    <div id="trackResult" aria-live="polite">
      <div class="order-card">
        <div class="order-card-header">
          <div>
            <div class="order-num" id="resOrderNum"></div>
            <div class="order-date" id="resOrderDate"></div>
          </div>
          <div id="resStatusBadge"></div>
        </div>
        <div class="order-body">

          <!-- Timeline -->
          <div class="order-section">
            <div class="order-section-label">Stato spedizione</div>
            <div class="timeline" id="resTimeline"></div>
          </div>

          <!-- Tracking link (only if shipped) -->
          <div class="order-section" id="resTrackingSection" style="display:none;">
            <div class="order-section-label">Tracking corriere</div>
            <p id="resTrackingNumber" style="font-size:.85rem;color:var(--text-muted);margin-bottom:.1rem;"></p>
            <a id="resTrackingLink" class="tracking-link" target="_blank" rel="noopener">
              <svg viewBox="0 0 24 24"><rect x="1" y="3" width="15" height="13"/><polygon points="16 8 20 8 23 11 23 16 16 16 16 8"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg>
              Segui la spedizione
            </a>
          </div>

          <!-- Info grid -->
          <div class="order-section">
            <div class="order-section-label">Dettagli ordine</div>
            <div class="info-grid" id="resInfoGrid"></div>
          </div>

          <!-- Total -->
          <div class="order-total-row">
            <span>Totale pagato</span>
            <span class="total-val" id="resTotal"></span>
          </div>
        </div>
      </div>

      <p class="track-new-search">Vuoi cercare un altro ordine? <a id="newSearchBtn">Nuova ricerca</a></p>
    </div>
  </main>

  <div data-include="site-footer"></div>

  <script src="api-client.js?v=5"></script>
  <script src="app.js?v=18"></script>
  <script>
  (function () {
    const form      = document.getElementById('trackForm');
    const btn       = document.getElementById('trackBtn');
    const errorBox  = document.getElementById('trackError');
    const resultBox = document.getElementById('trackResult');

    const STATUS_LABELS = {
      in_attesa:        'In attesa',
      in_preparazione:  'In preparazione',
      spedito:          'Spedito',
      consegnato:       'Consegnato',
      annullato:        'Annullato',
    };

    const TIMELINE_STEPS = [
      { key: 'in_attesa',       label: 'In attesa' },
      { key: 'in_preparazione', label: 'In preparazione' },
      { key: 'spedito',         label: 'Spedito' },
      { key: 'consegnato',      label: 'Consegnato' },
    ];

    const STEP_ORDER = ['in_attesa', 'in_preparazione', 'spedito', 'consegnato'];

    function showError(msg) {
      errorBox.textContent = msg;
      errorBox.classList.add('visible');
      resultBox.classList.remove('visible');
      resultBox.style.display = 'none';
    }

    function clearError() {
      errorBox.textContent = '';
      errorBox.classList.remove('visible');
    }

    function formatDate(dateStr) {
      if (!dateStr) return '—';
      const d = new Date(dateStr);
      return d.toLocaleDateString('it-IT', { day: '2-digit', month: 'long', year: 'numeric' });
    }

    function formatEur(val) {
      return '€' + parseFloat(val || 0).toFixed(2).replace('.', ',');
    }

    function buildTimeline(status) {
      const currentIdx = STEP_ORDER.indexOf(status);
      return TIMELINE_STEPS.map(function (step, i) {
        const done = i <= currentIdx;
        return '<div class="tl-step">' +
          '<div class="tl-dot' + (done ? ' done' : '') + '">' +
          (done ? '<svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>' : '') +
          '</div>' +
          '<span class="tl-label' + (done ? ' done' : '') + '">' + step.label + '</span>' +
          '</div>';
      }).join('');
    }

    function renderResult(order) {
      document.getElementById('resOrderNum').textContent = order.order_number || '—';
      document.getElementById('resOrderDate').textContent = 'Ordine del ' + formatDate(order.created_at);

      const statusKey = (order.order_status || '').toLowerCase();
      const statusLabel = STATUS_LABELS[statusKey] || order.order_status || '—';
      document.getElementById('resStatusBadge').innerHTML =
        '<span class="order-status-badge status-' + statusKey + '">' + statusLabel + '</span>';

      document.getElementById('resTimeline').innerHTML = buildTimeline(statusKey);

      // Tracking section
      const trackingSection = document.getElementById('resTrackingSection');
      if (order.tracking_number) {
        document.getElementById('resTrackingNumber').textContent = 'Codice: ' + order.tracking_number;
        const linkEl = document.getElementById('resTrackingLink');
        if (order.tracking_url) {
          linkEl.href = order.tracking_url;
          linkEl.style.display = '';
        } else {
          linkEl.style.display = 'none';
        }
        trackingSection.style.display = '';
      } else {
        trackingSection.style.display = 'none';
      }

      // Info grid
      const rows = [
        { lbl: 'Città di consegna', val: order.shipping_citta || '—' },
        { lbl: 'Paese',             val: order.shipping_paese || '—' },
        { lbl: 'Subtotale',         val: formatEur(order.subtotal) },
        { lbl: 'Spedizione',        val: order.shipping_cost > 0 ? formatEur(order.shipping_cost) : 'Gratuita' },
      ];
      if (order.discount_amount > 0) {
        rows.push({ lbl: 'Sconto applicato', val: '−' + formatEur(order.discount_amount) });
      }
      document.getElementById('resInfoGrid').innerHTML = rows.map(function (r) {
        return '<div class="info-row"><span class="lbl">' + r.lbl + '</span><span class="val">' + r.val + '</span></div>';
      }).join('');

      document.getElementById('resTotal').textContent = formatEur(order.total);

      resultBox.style.display = 'block';
      resultBox.classList.add('visible');
    }

    form.addEventListener('submit', async function (e) {
      e.preventDefault();
      clearError();

      const number = document.getElementById('orderNumber').value.trim();
      const email  = document.getElementById('orderEmail').value.trim();

      if (!number || !email) {
        showError('Inserisci sia il numero d\'ordine che l\'email.');
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Ricerca in corso…';

      try {
        const order = await MemiAPI.orders.track(number, email);
        renderResult(order);
      } catch (err) {
        const msg = (err && err.error) ? err.error : 'Ordine non trovato. Verifica il numero ordine e l\'email.';
        showError(msg);
      } finally {
        btn.disabled = false;
        btn.textContent = 'Cerca ordine';
      }
    });

    document.getElementById('newSearchBtn').addEventListener('click', function () {
      resultBox.classList.remove('visible');
      resultBox.style.display = 'none';
      clearError();
      form.reset();
      document.getElementById('orderNumber').focus();
    });
  })();
  </script>
</body>
</html>
